name: Bug report
description: Report a problem affecting OpenDrop users
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue. Please include reproducible details.
  - type: input
    id: version
    attributes:
      label: OpenDrop version
      placeholder: e.g. 0.1.0b1
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Python version, hardware
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command or API call
      description: Exact command/request that failed
      placeholder: opendrop pull ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      render: shell
